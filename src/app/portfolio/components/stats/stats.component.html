@if (loaded && visibleStats.length > 0) {
  <section id="stats">
    <div class="stats-strip">
      @for (stat of visibleStats; track stat.label) {
        <div class="stat-col" [style.flex]="stat.flex">
          <span class="stat-n" [class.is-hero]="stat.size === 'hero'" [class.is-major]="stat.size === 'major'">
            <span class="count" [attr.data-target]="stat.number">0</span>
            @if (stat.suffix) {
              <span class="stat-sfx">{{ stat.suffix }}</span>
            }
          </span>
          <div class="stat-desc">
            {{ stat.label }}
            @if (stat.labelAccent) {
              &nbsp;<span class="stat-desc-accent">{{ stat.labelAccent }}</span>
            }
            @if (stat.sublabel) {
              <br>{{ stat.sublabel }}
            }
          </div>
        </div>
      }
    </div>
  </section>
}
